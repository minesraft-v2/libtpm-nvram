name: Deploy Project Landing Page

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Framework
        uses: actions/configure-pages@v4

      - name: Upload Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: './vnv-switcher/static'

      - name: Deploy Assets Live to Web
        id: deployment
        uses: actions/deploy-pages@v4
